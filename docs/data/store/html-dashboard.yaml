desc: |-
  HTML Admin dashboard template to use in your project right now.

  Features:
    - HTML admin dashboard UI made with daisyUI 5
    - 90 pages, with every possible UI blocks needed for a dashboard
    - Web component charts
    - Framework agnostic. Can be used everywhere
    - No dependencies. No JS file in production. Uses CDN links for charts


  Including:
    - 90 pages, with tables, forms, charts, cards and other daisyUI UI blocks
      - Dashboard main page
      - 9 Product management pages: list, new, detail, edit, categories, inventory,
        stats, performance, logs, tags
      - 10 User management pages: list, new, detail, edit, roles, role new, role edit,
        permissions, payments, products, stats, logs
      - 5 Order management pages: list, detail, fulfillment, returns, abandoned
        checkouts
      - 4 Customer management pages: list, detail, segments, notes
      - 4 Transaction pages: list, detail, refunds, logs
      - 7 Analytics pages: overview, products, reports, sales, support, traffic, users
      - 6 Message/support pages: inbox, detail, agents, agent new, agent edit,
        departments, canned replies
      - 5 Media pages: library, upload, edit, folders, settings
      - 5 Blog pages: posts, new post, edit post, categories, tags, comments
      - 4 Content pages: list, new, edit, revisions
      - 4 Marketing pages: campaigns, audiences, automations, email
      - 4 Promotions pages: campaigns, coupons, discounts, gift cards
      - 8 Settings pages: general, commerce, integrations, notifications, payments,
        security, shipping, taxes
      - 4 Plugin pages: list, add, logs, settings
      - 5 Tools pages: import, export, scheduled jobs, system health, audit logs
      - daisyUI Skill
      - AGENTS.md file

