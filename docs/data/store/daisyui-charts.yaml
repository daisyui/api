desc: |-
  daisyUI Charts is a collection of chart integrations for daisyUI.


  - 39 different chart examples, easy to copy
  - Made with daisyUI and Apex Charts
  - Compatible with all daisyUI themes
  - Provides code examples for React, Vue, Svelte, Vanilla JS
  - Only one package dependency: Apex Charts (Or can be used with CDN link instead of Node package)
  - Easy copy/paste codes, no additional config or styles needed
  - Includes multiple examples for line charts, bar charts, area charts, column charts and pie charts.
  - Coming soon: raidal chart, heatmap charts and radar charts

