  intro:
    - "daisyUI adds semantic component classes to Tailwind CSS, such as `btn`, `card`, and `modal`. {libraryName} usually asks you to work through framework components or copied markup, so the daily workflow feels different."
    - "Use daisyUI when you want Tailwind CSS components without committing the UI layer to one JavaScript framework. {libraryName} can be useful, but it often fits best inside {otherFrameworks} projects."
    - "daisyUI focuses on CSS classes, design tokens, and themes. {libraryName} usually brings a more framework-shaped component model, which can add setup and maintenance work."
    - "If your team already uses Tailwind CSS, daisyUI turns common interface patterns into readable class names. Compared with {libraryName}, that keeps styling closer to HTML and further from framework glue."
    - "daisyUI works as a Tailwind CSS plugin with no browser JavaScript. {libraryName} often solves UI through JavaScript components, which changes the bundle, setup, and portability story."
    - "{libraryName} can cover useful UI needs, especially inside its preferred stack. daisyUI takes a narrower path: CSS components, theme variables, and framework-agnostic markup."
    - "The main difference is ownership. With daisyUI, your Tailwind CSS setup owns the styling system. With {libraryName}, more of the UI behavior and structure usually comes from the library."
    - "daisyUI is built for projects where the same component classes should work in React, Vue, Svelte, Astro, Laravel, Rails, or plain HTML. {libraryName} is usually less portable across those environments."
    - "When a project needs fast UI assembly without adding a JavaScript component runtime, daisyUI is the more direct fit. {libraryName} may offer components, but its integration model is heavier."
    - "daisyUI gives Tailwind CSS users ready-made components while keeping markup editable and predictable. {libraryName} often depends more on framework-specific APIs or component wrappers."
    - "Think of daisyUI as a CSS layer for Tailwind CSS, not a JavaScript UI framework. That distinction matters when you care about portability, runtime size, and long-term maintainability."
    - "daisyUI keeps the UI surface close to standard HTML and CSS. {libraryName} can be productive too, but its approach usually asks for more framework-specific decisions."
    - "For teams comparing UI libraries, daisyUI stands out when the goal is fewer dependencies, more themes, and simple Tailwind CSS markup. {libraryName} may still fit teams already invested in {otherFrameworks}."
    - "daisyUI uses CSS variables for themes and component styling, so customization can happen without rewriting every component. {libraryName} often pushes more changes through props, configuration, or copied classes."
    - "The comparison is less about which library has nicer screenshots and more about how each one affects your project. daisyUI keeps the component layer CSS-first, portable, and small."

