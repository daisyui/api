  themes:
    - "{libraryName} offers {otherThemes} theme(s), while daisyUI includes {daisyThemes}. That gives you more visual starting points before writing custom theme tokens."
    - "daisyUI's {daisyThemes} built-in themes help teams test different product moods quickly. {libraryName} provides {otherThemes}, so the starting palette is narrower."
    - "The theming difference is not only count. daisyUI can switch themes at runtime with CSS variables, which works well for user preferences and admin-controlled branding."
    - "With daisyUI, multiple themes can live on the same page. That is useful for previews, embedded widgets, tenant branding, and light or dark sections."
    - "{libraryName} has {otherThemes} theme option(s). daisyUI gives you {daisyThemes}, plus the ability to create custom themes with the same token system."
    - "daisyUI uses CSS variables for theme values, so colors and radius can change without rebuilding the application."
    - "When a product needs more than light and dark mode, daisyUI's theme system gives teams more room to work."
    - "The built-in daisyUI themes are useful as production choices, prototypes, and references for custom brand themes."
    - "Runtime theme switching is a practical advantage for dashboards, SaaS products, and sites with user-selectable appearance."
    - "daisyUI themes can be scoped to part of a page, so a preview panel or embedded area can use a different look from the shell."
    - "The {daisyThemes} themes in daisyUI reduce early design friction compared with the {otherThemes} theme(s) in {libraryName}."
    - "Because daisyUI themes are token-based, changing the product look does not require rewriting component markup."
    - "daisyUI's theming model fits projects that need brand customization, theme previews, or per-tenant styles."
    - "Compared with {libraryName}, daisyUI gives teams more built-in themes and a more flexible runtime switching model."
    - "Theme work stays close to CSS in daisyUI, which keeps visual customization readable and portable."

  performance:
    - "{libraryName} adds {otherJSSize} of JavaScript for its UI layer. daisyUI adds no browser JavaScript by default, so interactive code stays under your control."
    - "daisyUI keeps components CSS-first, which helps reduce bundle pressure when {libraryName} brings {otherJSSize} of JavaScript."
    - "If your performance budget is tight, daisyUI's 0KB JavaScript footprint is easier to defend than a UI library that adds {otherJSSize}."
    - "The dependency story also affects performance work. daisyUI adds 0 dependencies, while {libraryName} adds {depsCount} packages to the install graph."
    - "With daisyUI, buttons, cards, menus, and themes do not require a component runtime from the library."
    - "A smaller UI layer leaves more room in the bundle for product code, analytics, and the interactions you choose to ship."
    - "daisyUI's no-JavaScript default is useful for static pages, server-rendered apps, and frameworks that already manage interactivity."
    - "When {libraryName} adds {otherJSSize}, performance work often starts with measuring library cost. daisyUI avoids that cost at the component layer."
    - "CSS components can still be styled and themed without adding JavaScript. That is the performance tradeoff daisyUI makes."
    - "daisyUI lets you add JavaScript only where behavior needs it, instead of receiving it from the component library by default."
    - "The practical result is a lighter baseline: 0KB library JavaScript and no dependency chain from daisyUI itself."
    - "For content-heavy pages and fast prototypes, daisyUI's CSS-only component layer keeps the starting payload small."
    - "Performance budgets are easier to manage when the UI library does not add runtime JavaScript."
    - "daisyUI's component classes compile with your CSS pipeline, while {libraryName} may add JavaScript and dependencies you need to account for."
    - "The more UI you build, the more valuable it becomes that daisyUI does not add browser JavaScript by default."

  compatibility:
    - "{libraryName} usually fits best with {otherFrameworks}. daisyUI works anywhere Tailwind CSS or CSS class names work, including React, Vue, Svelte, Astro, Laravel, Rails, and plain HTML."
    - "daisyUI is framework-agnostic because it ships component styles as CSS classes. That makes it easier to reuse across projects with different frontend stacks."
    - "If one team uses React and another uses server-rendered templates, daisyUI can serve both with the same class names."
    - "daisyUI can run through a normal Tailwind CSS setup, a CDN file, or micro CSS files for individual components."
    - "Projects without Node.js still have a path with daisyUI through standalone CSS options."
    - "Because daisyUI does not own the component runtime, you can pair it with the routing, forms, and state tools your project already uses."
    - "The compatibility advantage matters during migrations. Markup using daisyUI classes can move between frameworks with less rewriting."
    - "{libraryName} may be productive in its preferred stack, but daisyUI is easier to share across mixed environments."
    - "For documentation sites, backend-rendered apps, and prototypes, daisyUI's CDN and no-build options can shorten setup."
    - "daisyUI micro CSS files let you load only specific component styles when a full install is unnecessary."
    - "A framework-neutral UI layer helps when your organization supports several stacks at once."
    - "daisyUI keeps styling portable because the interface is expressed through HTML classes rather than framework-only component APIs."
    - "When your stack changes, daisyUI classes can stay. That lowers the cost of moving between frontend frameworks."
    - "daisyUI works with any JavaScript framework and can also work without one, which gives it a wider deployment range than {libraryName}."
    - "Compatibility is one of daisyUI's strongest arguments: the same component vocabulary works across many tools."

  customization:
    - "{libraryName} customization often happens through component props, copied classes, or configuration. daisyUI uses CSS variables and Tailwind utilities, so global visual changes stay centralized."
    - "daisyUI exposes theme tokens for colors, radius, borders, and component styles. That makes brand changes easier to apply across the whole interface."
    - "Runtime CSS customization lets daisyUI change themes without a rebuild, which is useful for user settings and tenant-specific branding."
    - "Because daisyUI components are class-based, you can combine them with Tailwind utilities whenever a screen needs a local adjustment."
    - "daisyUI supports wide-gamut P3 colors with `oklch`, giving supported displays richer color while keeping standard CSS fallbacks possible."
    - "Global customization is simpler when component styles read from shared variables instead of scattered per-component overrides."
    - "daisyUI's customization model keeps design decisions in CSS, where designers and frontend developers can inspect them directly."
    - "You can start with a built-in daisyUI theme, then override only the tokens that match your product brand."
    - "Unlike systems that require editing many component examples, daisyUI lets the same markup respond to theme-level changes."
    - "Native CSS features, including nesting in the source, help daisyUI keep its stylesheet structure compact and maintainable."
    - "RTL support and runtime tokens make daisyUI a stronger fit for products that serve multiple languages or brands."
    - "The customization path is predictable: choose a theme, adjust CSS variables, and use Tailwind utilities for exceptions."
    - "daisyUI gives teams enough structure for consistency without blocking one-off Tailwind CSS adjustments."
    - "For design systems, daisyUI's token-based approach makes the component layer easier to document and change."
    - "Customization in daisyUI stays close to the platform: CSS variables, class names, and Tailwind utilities."
